# ==============================================================================
# Reusable Workflow: Java Service Build & Deploy
# ==============================================================================
# Usage in service repo:
#   jobs:
#     deploy:
#       uses: spacevox/.github/.github/workflows/reusable-java-service.yml@main
#       with:
#         service-name: account
#       secrets: inherit
# ==============================================================================

name: Java Service (Reusable)

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (e.g., account, catalog, embedding-service)'
        required: true
        type: string
      java-version:
        description: 'Java version'
        required: false
        default: '21'
        type: string
      skip-tests:
        description: 'Skip tests'
        required: false
        default: true
        type: boolean
      deploy-target:
        description: 'Deploy target: ec2-monolith, ecs, or none'
        required: false
        default: 'ec2-monolith'
        type: string
    secrets:
      PACKAGES_TOKEN:
        description: 'GitHub PAT for accessing GitHub Packages'
        required: false
      AWS_ROLE_ARN_DEV:
        description: 'AWS IAM Role ARN for dev environment'
        required: false
      AWS_ROLE_ARN_PROD:
        description: 'AWS IAM Role ARN for production environment'
        required: false

env:
  AWS_REGION: us-west-2
  MAVEN_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC'

jobs:
  # ===========================================================================
  # Determine Environment
  # ===========================================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      should-deploy: ${{ steps.env.outputs.should-deploy }}
      aws-account-id: ${{ steps.env.outputs.aws-account-id }}
      ec2-instance-id: ${{ steps.env.outputs.ec2-instance-id }}
    steps:
      - name: Determine Environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "environment=ci"
            echo "should-deploy=false"
          elif [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            echo "environment=production"
            echo "should-deploy=true"
            echo "aws-account-id=646966486018"
            echo "ec2-instance-id=i-097c342f42e804775"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "environment=dev"
            echo "should-deploy=true"
            echo "aws-account-id=109958268025"
            echo "ec2-instance-id=i-0dev12345678"
          else
            echo "environment=ci"
            echo "should-deploy=false"
          fi >> $GITHUB_OUTPUT

  # ===========================================================================
  # Build & Test
  # ===========================================================================
  build:
    runs-on: ubuntu-latest
    outputs:
      jar-name: ${{ steps.build.outputs.jar-name }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Build & Test
        id: build
        run: |
          SKIP_TESTS="${{ inputs.skip-tests == true && '-DskipTests' || '' }}"
          mvn clean package -B $SKIP_TESTS -Dmaven.javadoc.skip=true
          
          JAR_NAME=$(ls target/*.jar | head -1 | xargs basename)
          echo "jar-name=$JAR_NAME" >> $GITHUB_OUTPUT

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ===========================================================================
  # Deploy
  # ===========================================================================
  deploy:
    needs: [setup, build]
    if: needs.setup.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.environment == 'production' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: docker
        run: |
          ACCOUNT_ID="${{ needs.setup.outputs.aws-account-id }}"
          IMAGE="$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/spacevox/${{ inputs.service-name }}"
          ENV_TAG="${{ needs.setup.outputs.environment }}"
          
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:$ENV_TAG -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:$ENV_TAG
          docker push $IMAGE:latest
          
          echo "image=$IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 (docker-compose)
        if: inputs.deploy-target == 'ec2-monolith'
        run: |
          INSTANCE_ID="${{ needs.setup.outputs.ec2-instance-id }}"
          SERVICE="${{ inputs.service-name }}"
          
          # Send SSM command to pull and restart
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy $SERVICE" \
            --parameters commands="cd /opt/spacevox && docker-compose pull $SERVICE && docker-compose up -d $SERVICE" \
            --query "Command.CommandId" \
            --output text)
          
          echo "SSM Command ID: $COMMAND_ID"
          
          # Wait for completion
          sleep 10
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text

      - name: Summary
        run: |
          echo "## 🚀 Deployed ${{ inputs.service-name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ inputs.service-name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ needs.setup.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | ${{ steps.docker.outputs.image }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
