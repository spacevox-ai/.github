name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  # Increased memory to prevent OOM
  MAVEN_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build (Tests Skipped)
      run: mvn clean package -DskipTests -Dmaven.javadoc.skip=true -B
      
    - name: Upload Build Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: target/*.jar
        retention-days: 7
        if-no-files-found: ignore
