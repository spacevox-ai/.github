# ==============================================================================
# 🚀 SPACEVOX ADMIN - Deploy to Production
# ==============================================================================
# One-click deployment for both admin-api and admin-ui to production.
#
# What it does:
#   1. Builds admin-api JAR → Pushes Docker image to ECR
#   2. Builds admin-ui static site → Deploys to S3
#   3. Deploys admin-api to EC2 via SSM (restarts container)
#
# Architecture:
#   - admin-api: Runs as Docker container on EC2 (same instance as main monolith)
#   - admin-ui: Static site hosted on S3 (admin.work.studio)
#
# Prerequisites:
#   - AWS IAM role: arn:aws:iam::646966486018:role/github-actions-spacevox-prod
#   - ECR repo: spacevox/admin-api
#   - S3 bucket: admin.work.studio
#   - EC2 instance with Docker and docker-compose
# ==============================================================================

name: 🚀 Deploy Admin to Production

on:
  workflow_dispatch:
    inputs:
      deploy_api:
        description: 'Deploy admin-api (backend)'
        required: false
        default: true
        type: boolean
      deploy_ui:
        description: 'Deploy admin-ui (frontend)'
        required: false
        default: true
        type: boolean
      skip_tests:
        description: 'Skip tests'
        required: false
        default: true
        type: boolean

concurrency:
  group: admin-production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: '646966486018'
  ECR_REGISTRY: 646966486018.dkr.ecr.us-west-2.amazonaws.com
  ECR_ADMIN_API: spacevox/admin-api
  EC2_INSTANCE_ID: 'i-097c342f42e804775'
  ADMIN_UI_S3_BUCKET: 'admin.work.studio'
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Build & Deploy Admin API
  # ===========================================================================
  deploy-api:
    name: Deploy Admin API
    if: ${{ inputs.deploy_api }}
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      # =========================================
      # 1. CHECKOUT ADMIN-API
      # =========================================
      - name: Checkout admin-api
        uses: actions/checkout@v4
        with:
          repository: spacevox-ai/admin-api
          token: ${{ secrets.DEPLOY_PAT }}
          path: admin-api

      # =========================================
      # 2. SETUP JAVA
      # =========================================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # =========================================
      # 3. CONFIGURE MAVEN (for base-* dependencies)
      # =========================================
      - name: Configure Maven (GitHub Packages)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GH_PACKAGES_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      # =========================================
      # 4. BUILD ADMIN-API
      # =========================================
      - name: Build Admin API
        working-directory: admin-api
        run: |
          echo "📦 Building admin-api..."
          if [ "${{ inputs.skip_tests }}" = "true" ]; then
            mvn -B clean package -DskipTests -Dmaven.javadoc.skip=true
          else
            mvn -B clean package -Dmaven.javadoc.skip=true
          fi
          echo "✅ Admin API built"
          ls -la target/*.jar

      # =========================================
      # 5. CONFIGURE AWS & LOGIN TO ECR
      # =========================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-spacevox-prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # =========================================
      # 6. BUILD & PUSH DOCKER IMAGE
      # =========================================
      - name: Build and Push Docker Image
        working-directory: admin-api
        run: |
          VERSION="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
          
          echo "🐳 Building admin-api Docker image: $VERSION"
          
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_ADMIN_API }}:$VERSION .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_ADMIN_API }}:$VERSION \
                     ${{ env.ECR_REGISTRY }}/${{ env.ECR_ADMIN_API }}:latest
          
          echo "📤 Pushing to ECR..."
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_ADMIN_API }}:$VERSION
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_ADMIN_API }}:latest
          
          echo "✅ Docker image pushed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_ADMIN_API }}:$VERSION"

      # =========================================
      # 7. DEPLOY TO EC2 VIA SSM
      # =========================================
      - name: Deploy to EC2
        run: |
          echo "🚀 Deploying admin-api to EC2..."
          
          # Send deployment command via SSM
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "echo === Deploying admin-api ===",
              "cd /opt/spacevox",
              "echo Logging into ECR...",
              "aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "echo Pulling latest admin-api image...",
              "docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_ADMIN_API }}:latest",
              "echo Restarting admin-api container...",
              "docker-compose stop admin-api || true",
              "docker-compose rm -f admin-api || true",
              "docker-compose up -d admin-api",
              "echo Waiting for health check...",
              "sleep 30",
              "curl -f http://localhost:8090/actuator/health || echo Admin API health check pending",
              "echo === admin-api deployment complete ==="
            ]' \
            --timeout-seconds 300 \
            --query 'Command.CommandId' \
            --output text)
          
          echo "SSM Command ID: $COMMAND_ID"
          
          # Wait for command to complete
          echo "Waiting for deployment to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true
          
          # Get command output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query 'StandardOutputContent' \
            --output text || echo "Could not retrieve command output"
          
          echo "✅ Admin API deployment initiated!"

      - name: API Deployment Summary
        run: |
          echo "### ✅ Admin API Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.ECR_REGISTRY }}/${{ env.ECR_ADMIN_API }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** EC2 (${{ env.EC2_INSTANCE_ID }})" >> $GITHUB_STEP_SUMMARY
          echo "**Endpoint:** https://admin.work.studio/api" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Build & Deploy Admin UI
  # ===========================================================================
  deploy-ui:
    name: Deploy Admin UI
    if: ${{ inputs.deploy_ui }}
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      # =========================================
      # 1. CHECKOUT ADMIN-UI
      # =========================================
      - name: Checkout admin-ui
        uses: actions/checkout@v4
        with:
          repository: spacevox-ai/admin-ui
          token: ${{ secrets.DEPLOY_PAT }}
          path: admin-ui

      # =========================================
      # 2. SETUP NODE.JS
      # =========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json

      # =========================================
      # 3. BUILD ADMIN-UI
      # =========================================
      - name: Install dependencies
        working-directory: admin-ui
        run: npm ci

      - name: Build Admin UI
        working-directory: admin-ui
        run: |
          echo "📦 Building admin-ui for production..."
          npm run build
          echo "✅ Admin UI built"
          ls -la dist/
        env:
          VITE_API_URL: https://admin.work.studio/api/v1
          VITE_KEYCLOAK_URL: https://auth.work.studio
          VITE_KEYCLOAK_REALM: spacevox-admin
          VITE_KEYCLOAK_CLIENT_ID: admin-ui
          VITE_OIDC_AUTHORITY: https://auth.work.studio/realms/spacevox-admin
          VITE_OIDC_REDIRECT_URL: https://admin.work.studio/
          VITE_GRAFANA_URL: https://grafana.work.studio
          VITE_PROMETHEUS_URL: https://prometheus.work.studio
          VITE_JAEGER_URL: https://jaeger.work.studio

      # =========================================
      # 4. CONFIGURE AWS
      # =========================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-spacevox-prod
          aws-region: ${{ env.AWS_REGION }}

      # =========================================
      # 5. DEPLOY TO S3
      # =========================================
      - name: Deploy to S3
        working-directory: admin-ui
        run: |
          echo "📤 Deploying admin-ui to S3..."
          
          # Sync all assets with long cache (immutable hashed files)
          aws s3 sync dist/ s3://${{ env.ADMIN_UI_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"
          
          # index.html should not be cached (always fresh)
          aws s3 cp dist/index.html s3://${{ env.ADMIN_UI_S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          
          # JSON config files with short cache
          aws s3 sync dist/ s3://${{ env.ADMIN_UI_S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.json" \
            --cache-control "public, max-age=300"
          
          echo "✅ Admin UI deployed to s3://${{ env.ADMIN_UI_S3_BUCKET }}/"

      - name: UI Deployment Summary
        run: |
          echo "### ✅ Admin UI Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** \`${{ env.ADMIN_UI_S3_BUCKET }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://admin.work.studio" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Final Summary
  # ===========================================================================
  summary:
    name: Deployment Summary
    needs: [deploy-api, deploy-ui]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 SpaceVox Admin Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.deploy_api }}" = "true" ]; then
            if [ "${{ needs.deploy-api.result }}" = "success" ]; then
              echo "- ✅ **admin-api**: Deployed to EC2" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.deploy-api.result }}" = "skipped" ]; then
              echo "- ⏭️ **admin-api**: Skipped" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **admin-api**: FAILED" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⏭️ **admin-api**: Not selected" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.deploy_ui }}" = "true" ]; then
            if [ "${{ needs.deploy-ui.result }}" = "success" ]; then
              echo "- ✅ **admin-ui**: Deployed to S3" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.deploy-ui.result }}" = "skipped" ]; then
              echo "- ⏭️ **admin-ui**: Skipped" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ **admin-ui**: FAILED" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⏭️ **admin-ui**: Not selected" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Admin Panel:** https://admin.work.studio" >> $GITHUB_STEP_SUMMARY
          echo "- **Admin API:** https://admin.work.studio/api" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Check:** https://admin.work.studio/api/actuator/health" >> $GITHUB_STEP_SUMMARY
