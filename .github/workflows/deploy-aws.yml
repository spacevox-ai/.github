# ==============================================================================
# SpaceVox CI/CD Pipeline - Production Deployment
# ==============================================================================
# Triggers on:
#   - Push to main branch (after PR merge from develop)
#   - Manual workflow dispatch with approval
# 
# Uses images already built and tested in staging (promotes :staging tag)
# ==============================================================================

name: Deploy to Production

on:
  push:
    branches:
      - production
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy (comma-separated, or "all")'
        required: false
        default: 'all'
      image_tag:
        description: 'Image tag to deploy (default: staging)'
        required: false
        default: 'staging'

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID_PROD }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_PROD }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.us-west-2.amazonaws.com
  ECS_CLUSTER: spacevox-production
  ENVIRONMENT: production
  # Increased memory to prevent OOM
  MAVEN_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC'

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Detect Changed Services
  # ===========================================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Services
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.services }}" != "all" ]; then
            echo "services=${{ inputs.services }}" >> $GITHUB_OUTPUT
          else
            # Detect changes based on git diff
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "^(account|catalog|config|connection|portal|run|storage|subscription|task|trigger|webhook|insights|notification|ai-runtime|studio-management|kb-worker|embedding-service|workflow-gateway|workflow-engine|dataplane-agent)/" | cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
            
            if [ -z "$CHANGED" ]; then
              # Check if base modules changed
              BASE_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "^base-" | head -1)
              if [ -n "$BASE_CHANGED" ]; then
                echo "services=all" >> $GITHUB_OUTPUT
              else
                echo "services=" >> $GITHUB_OUTPUT
              fi
            else
              echo "services=$CHANGED" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate Matrix
        id: matrix
        run: |
          SERVICES="${{ steps.changes.outputs.services }}"
          
          if [ -z "$SERVICES" ]; then
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
          elif [ "$SERVICES" == "all" ]; then
            echo 'matrix={"service":["account","catalog","config","connection","portal","run","storage","subscription","task","trigger","webhook","insights","notification","ai-runtime","studio-management","kb-worker","embedding-service","workflow-gateway","workflow-engine","dataplane-agent"]}' >> $GITHUB_OUTPUT
          else
            MATRIX=$(echo $SERVICES | tr ',' '\n' | jq -R -s -c 'split("\n")[:-1]')
            echo "matrix={\"service\":$MATRIX}" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Build Base Modules
  # ===========================================================================
  build-base:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != ''
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Base Modules
        run: |
          cd base-modules
          mvn clean install -DskipTests -B

      - name: Cache Base Modules
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-base-${{ github.sha }}

  # ===========================================================================
  # Build & Push Services
  # ===========================================================================
  build-services:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.services != ''
    
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Restore Base Modules Cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-base-${{ github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Service JAR
        working-directory: ${{ matrix.service }}
        run: |
          mvn clean package -DskipTests -B

      - name: Build & Push Docker Image
        working-directory: ${{ matrix.service }}
        run: |
          IMAGE_TAG="${{ github.sha }}"
          REPO="${{ env.ECR_REGISTRY }}/spacevox/${{ matrix.service }}"
          
          # Use service Dockerfile or fallback to template
          if [ -f "Dockerfile" ]; then
            docker build -t $REPO:$IMAGE_TAG -t $REPO:latest .
          else
            docker build -t $REPO:$IMAGE_TAG -t $REPO:latest \
              -f ../deployment/docker/Dockerfile.java \
              --build-arg JAR_FILE=target/*.jar .
          fi
          
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest
          
          echo "image=$REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Deploy to ECS
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-services]
    if: needs.detect-changes.outputs.services != ''
    environment: production
    
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      max-parallel: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS Service
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/spacevox/${{ matrix.service }}:${{ github.sha }}"
          
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition spacevox-${{ matrix.service }} \
            --query 'taskDefinition' \
            --output json)
          
          # Update image in task definition
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          
          # Register new task definition
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          # Update service
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ matrix.service }} \
            --task-definition $NEW_TASK_ARN \
            --force-new-deployment

      - name: Wait for Deployment
        run: |
          echo "Waiting for ${{ matrix.service }} deployment..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ matrix.service }} \
            --max-attempts 60

  # ===========================================================================
  # Post-Deployment Verification
  # ===========================================================================
  verify:
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy]
    if: always() && needs.deploy.result == 'success'
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify Deployments
        run: |
          echo "Verifying service health..."
          
          SERVICES="${{ needs.detect-changes.outputs.services }}"
          
          if [ "$SERVICES" == "all" ]; then
            SERVICES="account,catalog,config,connection,portal,run,storage"
          fi
          
          for service in $(echo $SERVICES | tr ',' ' '); do
            echo "Checking $service..."
            STATUS=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services $service \
              --query 'services[0].runningCount' \
              --output text)
            
            if [ "$STATUS" == "0" ]; then
              echo "WARNING: $service has 0 running tasks!"
            else
              echo "$service: $STATUS running tasks"
            fi
          done

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Deployment verification failed!"
          # Add Slack/Teams notification here

  # ===========================================================================
  # Run Infrastructure (Optional - Manual Trigger)
  # ===========================================================================
  terraform:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_terraform == 'true'
    environment: production
    
    defaults:
      run:
        working-directory: infrastructure/environments/production
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="db_master_password=${{ secrets.DB_PASSWORD }}" \
            -var="redis_auth_token=${{ secrets.REDIS_AUTH_TOKEN }}" \
            -var="certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
