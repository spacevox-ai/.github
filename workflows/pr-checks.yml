# ==============================================================================
# SpaceVox CI Pipeline - Pull Request Checks
# ==============================================================================
# Runs on PRs to develop/main - builds but does NOT run tests (skipped for now)
# ==============================================================================

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - production
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  AWS_REGION: us-west-2
  # Increased memory to prevent OOM
  MAVEN_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC'

permissions:
  contents: read
  pull-requests: write

jobs:
  # ===========================================================================
  # Detect Changed Services
  # ===========================================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      base-changed: ${{ steps.changes.outputs.base-changed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Services
        id: changes
        run: |
          # Get changed files in PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          # Check if base modules changed
          BASE_CHANGED=$(echo "$CHANGED_FILES" | grep -E "^base-" | head -1 || true)
          if [ -n "$BASE_CHANGED" ]; then
            echo "base-changed=true" >> $GITHUB_OUTPUT
            echo "services=all" >> $GITHUB_OUTPUT
          else
            echo "base-changed=false" >> $GITHUB_OUTPUT
            
            # Detect individual service changes
            CHANGED=$(echo "$CHANGED_FILES" | \
              grep -E "^(account|admin-api|catalog|config|connection|portal|run|storage|subscription|task|trigger|webhook|insights|notification|ai-runtime|studio-management|kb-worker|embedding-service|workflow-gateway|workflow-engine|dataplane-agent)/" | \
              cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//' || true)
            
            echo "services=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Generate Matrix
        id: matrix
        run: |
          SERVICES="${{ steps.changes.outputs.services }}"
          
          ALL_SERVICES='["account","admin-api","catalog","config","portal","run","storage","subscription","task","trigger","webhook","insights","notification","kb-worker","workflow-engine"]'
          
          if [ -z "$SERVICES" ]; then
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
          elif [ "$SERVICES" == "all" ]; then
            echo "matrix={\"service\":$ALL_SERVICES}" >> $GITHUB_OUTPUT
          else
            MATRIX=$(echo $SERVICES | tr ',' '\n' | jq -R -s -c 'split("\n")[:-1]')
            echo "matrix={\"service\":$MATRIX}" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Build Base Modules
  # ===========================================================================
  build-base:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != ''
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Base Modules
        run: |
          cd base-modules
          mvn clean install -DskipTests -B -q
          echo "✅ Base modules built"

      - name: Cache Base Modules
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-pr-${{ github.sha }}

  # ===========================================================================
  # Build & Test Services
  # ===========================================================================
  build-test:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.services != ''
    
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Restore Base Modules Cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-pr-${{ github.sha }}

      - name: Build Service (Tests Skipped)
        working-directory: ${{ matrix.service }}
        run: |
          # Skip tests for now - focus on build verification
          mvn clean package -DskipTests -Dmaven.javadoc.skip=true -B
          echo "✅ ${{ matrix.service }} build passed"

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-test]
    if: always()
    
    steps:
      - name: PR Summary
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.detect-changes.outputs.base-changed }}" == "true" ]; then
            echo "⚠️ **Base modules changed** - all services will be rebuilt on merge" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services checked:** ${{ needs.detect-changes.outputs.services }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build-test.result }}" == "success" ]; then
            echo "✅ All builds passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some builds failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ *Tests are currently skipped to speed up PR checks*" >> $GITHUB_STEP_SUMMARY
