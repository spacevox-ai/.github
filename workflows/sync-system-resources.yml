name: Sync System Resources

# Triggers when system resource YAML files are changed
on:
  push:
    branches: [ main ]
    paths:
      - 'platform-resources/**/*.yaml'
      - 'platform-resources/**/*.yml'
  
  # Allow manual trigger (useful for initial setup or re-sync)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      resource_type:
        description: 'Resource type to sync (or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - agents
          - connectors
          - mcp-servers
      dry_run:
        description: 'Dry run (no actual sync)'
        required: false
        default: false
        type: boolean

env:
  # Default to staging for automated pushes
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
  RESOURCE_TYPE: ${{ github.event.inputs.resource_type || 'all' }}

jobs:
  detect-changes:
    name: Detect Changed Resources
    runs-on: ubuntu-latest
    outputs:
      agents_changed: ${{ steps.changed-files.outputs.agents_any_changed }}
      connectors_changed: ${{ steps.changed-files.outputs.connectors_any_changed }}
      mcp_servers_changed: ${{ steps.changed-files.outputs.mcp_servers_any_changed }}
      agents_files: ${{ steps.changed-files.outputs.agents_all_changed_files }}
      connectors_files: ${{ steps.changed-files.outputs.connectors_all_changed_files }}
      mcp_servers_files: ${{ steps.changed-files.outputs.mcp_servers_all_changed_files }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files_yaml: |
            agents:
              - platform-resources/agents/**/*.yaml
              - platform-resources/agents/**/*.yml
            connectors:
              - platform-resources/connectors/**/*.yaml
              - platform-resources/connectors/**/*.yml
            mcp_servers:
              - platform-resources/mcp-servers/**/*.yaml
              - platform-resources/mcp-servers/**/*.yml

  sync-agents:
    name: Sync System Agents
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      (needs.detect-changes.outputs.agents_changed == 'true' || 
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.resource_type == 'all' || github.event.inputs.resource_type == 'agents')))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment URLs
        id: env-config
        run: |
          if [ "${{ env.ENVIRONMENT }}" = "production" ]; then
            echo "ADMIN_API_URL=${{ secrets.ADMIN_API_URL_PROD }}" >> $GITHUB_OUTPUT
            echo "API_TOKEN=${{ secrets.SYSTEM_SYNC_TOKEN_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "ADMIN_API_URL=${{ secrets.ADMIN_API_URL_STAGING }}" >> $GITHUB_OUTPUT
            echo "API_TOKEN=${{ secrets.SYSTEM_SYNC_TOKEN_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Sync agents
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SOURCE="github:${{ github.repository }}@${{ github.ref_name }}"
          
          # Determine which files to sync
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "${{ needs.detect-changes.outputs.agents_files }}" ]; then
            echo "Manual full sync - finding all agent YAMLs"
            FILES=$(find platform-resources/agents -name "*.yaml" -o -name "*.yml" 2>/dev/null || echo "")
          else
            FILES="${{ needs.detect-changes.outputs.agents_files }}"
          fi
          
          if [ -z "$FILES" ]; then
            echo "No agent files to sync"
            exit 0
          fi
          
          # Process each file
          for file in $FILES; do
            if [ -f "$file" ]; then
              echo "Syncing agent: $file"
              
              CONTENT=$(cat "$file")
              
              REQUEST=$(jq -n \
                --arg yaml "$CONTENT" \
                --arg path "$file" \
                --arg sha "$COMMIT_SHA" \
                --arg source "$SOURCE" \
                '{yamlContent: $yaml, filePath: $path, commitSha: $sha, source: $source}')
              
              if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
                echo "DRY RUN - Would sync: $file"
                continue
              fi
              
              RESPONSE=$(curl -s -X POST \
                "${{ steps.env-config.outputs.ADMIN_API_URL }}/api/admin/v1/system-resources/agents/sync" \
                -H "Authorization: Bearer ${{ steps.env-config.outputs.API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "$REQUEST")
              
              echo "Response: $RESPONSE"
            fi
          done

  sync-connectors:
    name: Sync System Connectors
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      (needs.detect-changes.outputs.connectors_changed == 'true' || 
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.resource_type == 'all' || github.event.inputs.resource_type == 'connectors')))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment URLs
        id: env-config
        run: |
          if [ "${{ env.ENVIRONMENT }}" = "production" ]; then
            echo "ADMIN_API_URL=${{ secrets.ADMIN_API_URL_PROD }}" >> $GITHUB_OUTPUT
            echo "API_TOKEN=${{ secrets.SYSTEM_SYNC_TOKEN_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "ADMIN_API_URL=${{ secrets.ADMIN_API_URL_STAGING }}" >> $GITHUB_OUTPUT
            echo "API_TOKEN=${{ secrets.SYSTEM_SYNC_TOKEN_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Sync connectors
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SOURCE="github:${{ github.repository }}@${{ github.ref_name }}"
          
          # Determine which files to sync
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "${{ needs.detect-changes.outputs.connectors_files }}" ]; then
            echo "Manual full sync - finding all connector YAMLs"
            FILES=$(find platform-resources/connectors -name "*.yaml" -o -name "*.yml" 2>/dev/null || echo "")
          else
            FILES="${{ needs.detect-changes.outputs.connectors_files }}"
          fi
          
          if [ -z "$FILES" ]; then
            echo "No connector files to sync"
            exit 0
          fi
          
          # Process each file
          for file in $FILES; do
            if [ -f "$file" ]; then
              echo "Syncing connector: $file"
              
              CONTENT=$(cat "$file")
              
              REQUEST=$(jq -n \
                --arg yaml "$CONTENT" \
                --arg path "$file" \
                --arg sha "$COMMIT_SHA" \
                --arg source "$SOURCE" \
                '{yamlContent: $yaml, filePath: $path, commitSha: $sha, source: $source}')
              
              if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
                echo "DRY RUN - Would sync: $file"
                continue
              fi
              
              RESPONSE=$(curl -s -X POST \
                "${{ steps.env-config.outputs.ADMIN_API_URL }}/api/admin/v1/system-resources/connectors/sync" \
                -H "Authorization: Bearer ${{ steps.env-config.outputs.API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "$REQUEST")
              
              echo "Response: $RESPONSE"
            fi
          done

  sync-mcp-servers:
    name: Sync System MCP Servers
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      (needs.detect-changes.outputs.mcp_servers_changed == 'true' || 
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.resource_type == 'all' || github.event.inputs.resource_type == 'mcp-servers')))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment URLs
        id: env-config
        run: |
          if [ "${{ env.ENVIRONMENT }}" = "production" ]; then
            echo "ADMIN_API_URL=${{ secrets.ADMIN_API_URL_PROD }}" >> $GITHUB_OUTPUT
            echo "API_TOKEN=${{ secrets.SYSTEM_SYNC_TOKEN_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "ADMIN_API_URL=${{ secrets.ADMIN_API_URL_STAGING }}" >> $GITHUB_OUTPUT
            echo "API_TOKEN=${{ secrets.SYSTEM_SYNC_TOKEN_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Sync MCP servers
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SOURCE="github:${{ github.repository }}@${{ github.ref_name }}"
          
          # Determine which files to sync
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "${{ needs.detect-changes.outputs.mcp_servers_files }}" ]; then
            echo "Manual full sync - finding all MCP server YAMLs"
            FILES=$(find platform-resources/mcp-servers -name "*.yaml" -o -name "*.yml" 2>/dev/null || echo "")
          else
            FILES="${{ needs.detect-changes.outputs.mcp_servers_files }}"
          fi
          
          if [ -z "$FILES" ]; then
            echo "No MCP server files to sync"
            exit 0
          fi
          
          # Process each file
          for file in $FILES; do
            if [ -f "$file" ]; then
              echo "Syncing MCP server: $file"
              
              CONTENT=$(cat "$file")
              
              REQUEST=$(jq -n \
                --arg yaml "$CONTENT" \
                --arg path "$file" \
                --arg sha "$COMMIT_SHA" \
                --arg source "$SOURCE" \
                '{yamlContent: $yaml, filePath: $path, commitSha: $sha, source: $source}')
              
              if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
                echo "DRY RUN - Would sync: $file"
                continue
              fi
              
              RESPONSE=$(curl -s -X POST \
                "${{ steps.env-config.outputs.ADMIN_API_URL }}/api/admin/v1/system-resources/mcp-servers/sync" \
                -H "Authorization: Bearer ${{ steps.env-config.outputs.API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "$REQUEST")
              
              echo "Response: $RESPONSE"
            fi
          done

  summary:
    name: Sync Summary
    runs-on: ubuntu-latest
    needs: [sync-agents, sync-connectors, sync-mcp-servers]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "## System Resource Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Type**: ${{ env.RESOURCE_TYPE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Agents | ${{ needs.sync-agents.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Connectors | ${{ needs.sync-connectors.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Servers | ${{ needs.sync-mcp-servers.result }} |" >> $GITHUB_STEP_SUMMARY
