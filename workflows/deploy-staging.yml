# ==============================================================================
# SpaceVox CI/CD Pipeline - Staging Deployment
# ==============================================================================
# Triggers on push to main branch → deploys to staging
# ==============================================================================

name: Deploy to Staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy (comma-separated, or "all")'
        required: false
        default: 'all'

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID_STAGING }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_STAGING }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID_STAGING }}.dkr.ecr.us-west-2.amazonaws.com
  ECS_CLUSTER: spacevox-staging
  ENVIRONMENT: staging
  # Increased memory to prevent OOM
  MAVEN_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC'

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Detect Changed Services
  # ===========================================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      base-changed: ${{ steps.changes.outputs.base-changed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Services
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.services }}" != "all" ]; then
            echo "services=${{ inputs.services }}" >> $GITHUB_OUTPUT
            echo "base-changed=false" >> $GITHUB_OUTPUT
          else
            # Check if base modules changed
            BASE_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "^base-" | head -1)
            if [ -n "$BASE_CHANGED" ]; then
              echo "base-changed=true" >> $GITHUB_OUTPUT
              echo "services=all" >> $GITHUB_OUTPUT
            else
              echo "base-changed=false" >> $GITHUB_OUTPUT
              
              # Detect individual service changes
              CHANGED=$(git diff --name-only HEAD~1 HEAD | \
                grep -E "^(account|admin-api|catalog|config|connection|portal|run|storage|subscription|task|trigger|webhook|insights|notification|ai-runtime|studio-management|kb-worker|embedding-service|workflow-gateway|workflow-engine|dataplane-agent|voip-runtime|voip-gateway|speech-service|message-capture|message-processor|intent-compiler)/" | \
                cut -d'/' -f1 | sort -u | tr '\n' ',' | sed 's/,$//')
              
              echo "services=$CHANGED" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate Matrix
        id: matrix
        run: |
          SERVICES="${{ steps.changes.outputs.services }}"
          
          ALL_SERVICES='["account","admin-api","catalog","config","portal","run","storage","subscription","task","trigger","webhook","insights","notification","kb-worker","embedding-service","workflow-gateway","workflow-engine","dataplane-agent"]'
          
          if [ -z "$SERVICES" ]; then
            echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
          elif [ "$SERVICES" == "all" ]; then
            echo "matrix={\"service\":$ALL_SERVICES}" >> $GITHUB_OUTPUT
          else
            MATRIX=$(echo $SERVICES | tr ',' '\n' | jq -R -s -c 'split("\n")[:-1]')
            echo "matrix={\"service\":$MATRIX}" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Build Base Modules (only if changed or all)
  # ===========================================================================
  build-base:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != ''
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Base Modules
        run: |
          cd base-modules
          mvn clean install -DskipTests -B -q
          echo "✅ Base modules built successfully"

      - name: Cache Base Modules
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-base-${{ github.sha }}

  # ===========================================================================
  # Build & Push Services to ECR
  # ===========================================================================
  build-services:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-base]
    if: needs.detect-changes.outputs.services != ''
    
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    
    outputs:
      image-tag: ${{ github.sha }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Restore Base Modules Cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-base-${{ github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Service JAR
        working-directory: ${{ matrix.service }}
        run: |
          mvn clean package -DskipTests -B -q
          echo "✅ ${{ matrix.service }} JAR built"

      - name: Build & Push Docker Image
        working-directory: ${{ matrix.service }}
        run: |
          IMAGE_TAG="${{ github.sha }}"
          REPO="${{ env.ECR_REGISTRY }}/spacevox/${{ matrix.service }}"
          
          # Build image
          if [ -f "Dockerfile" ]; then
            docker build -t $REPO:$IMAGE_TAG -t $REPO:staging -t $REPO:latest .
          else
            docker build -t $REPO:$IMAGE_TAG -t $REPO:staging -t $REPO:latest \
              -f ../deployment/docker/Dockerfile.java \
              --build-arg JAR_FILE=target/*.jar .
          fi
          
          # Push all tags
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:staging
          docker push $REPO:latest
          
          echo "✅ ${{ matrix.service }} pushed to ECR: $REPO:$IMAGE_TAG"

  # ===========================================================================
  # Deploy to ECS Staging
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-services]
    if: needs.detect-changes.outputs.services != ''
    environment: staging
    
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      max-parallel: 5
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS Task Definition
        id: update-task
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE="${{ env.ECR_REGISTRY }}/spacevox/${SERVICE}:${{ github.sha }}"
          TASK_FAMILY="spacevox-${SERVICE}"
          
          # Handle -v2 service naming
          ECS_SERVICE="${SERVICE}"
          if [ "$SERVICE" == "account" ]; then
            ECS_SERVICE="account-v2"
          elif [ "$SERVICE" == "workflow-gateway" ]; then
            ECS_SERVICE="workflow-gateway-v2"
          fi
          
          echo "Deploying $SERVICE (ECS: $ECS_SERVICE) with image: $IMAGE"
          
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query 'taskDefinition' \
            --output json 2>/dev/null || echo "")
          
          if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" == "" ]; then
            echo "⚠️ Task definition $TASK_FAMILY not found, skipping"
            exit 0
          fi
          
          # Update image in task definition
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE | 
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, 
                 .compatibilities, .registeredAt, .registeredBy)')
          
          # Register new task definition
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          echo "task-arn=$NEW_TASK_ARN" >> $GITHUB_OUTPUT
          echo "ecs-service=$ECS_SERVICE" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        if: steps.update-task.outputs.task-arn != ''
        run: |
          ECS_SERVICE="${{ steps.update-task.outputs.ecs-service }}"
          TASK_ARN="${{ steps.update-task.outputs.task-arn }}"
          
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service $ECS_SERVICE \
            --task-definition $TASK_ARN \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text
          
          echo "✅ Deployed $ECS_SERVICE"

  # ===========================================================================
  # Wait for Stable & Notify
  # ===========================================================================
  verify:
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy]
    if: always() && needs.deploy.result == 'success'
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for Services to Stabilize
        run: |
          echo "⏳ Waiting for deployments to stabilize..."
          sleep 60
          
          SERVICES="${{ needs.detect-changes.outputs.services }}"
          
          if [ "$SERVICES" == "all" ]; then
            # Check core services only
            SERVICES="account-v2,admin-api,catalog,config,portal"
          fi
          
          echo ""
          echo "=== Deployment Status ==="
          for service in $(echo $SERVICES | tr ',' ' '); do
            # Handle -v2 naming
            ECS_SVC="$service"
            [[ "$service" == "account" ]] && ECS_SVC="account-v2"
            [[ "$service" == "workflow-gateway" ]] && ECS_SVC="workflow-gateway-v2"
            
            STATUS=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services $ECS_SVC \
              --query 'services[0].{running:runningCount,desired:desiredCount}' \
              --output text 2>/dev/null || echo "0 0")
            
            RUNNING=$(echo $STATUS | cut -f1)
            DESIRED=$(echo $STATUS | cut -f2)
            
            if [ "$RUNNING" == "$DESIRED" ] && [ "$RUNNING" != "0" ]; then
              echo "✅ $ECS_SVC: $RUNNING/$DESIRED"
            else
              echo "⚠️ $ECS_SVC: $RUNNING/$DESIRED"
            fi
          done

      - name: Summary
        run: |
          echo "## 🚀 Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:** ${{ needs.detect-changes.outputs.services }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://admin.staging.work.studio" >> $GITHUB_STEP_SUMMARY
