# ==============================================================================
# SpaceVox Monolith - Production Deployment Pipeline
# ==============================================================================
# 
# Builds and deploys the monolith to production (EC2 instance with Docker).
# 
# Triggers:
#   - Push to production branch
#   - Manual workflow dispatch with approval
#
# Flow:
#   1. Build monolith JAR (all 17 Spring Boot services)
#   2. Build Docker image
#   3. Push to ECR with :production and :vX.Y.Z tags
#   4. Deploy to EC2 via docker pull + restart
#
# ==============================================================================

name: Deploy Monolith (Production)

on:
  push:
    branches:
      - production
    paths:
      - 'spacevox-monolith/**'
      - 'base-*/**'
      - 'account/**'
      - 'catalog/**'
      - 'config/**'
      - 'connection/**'
      - 'portal/**'
      - 'run/**'
      - 'storage/**'
      - 'subscription/**'
      - 'task/**'
      - 'trigger/**'
      - 'webhook/**'
      - 'insights/**'
      - 'notification/**'
      - 'ai-runtime/**'
      - 'studio-management/**'
      - 'kb-worker/**'
      - 'workflow-gateway/**'
  
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (not recommended for production)'
        required: false
        default: false
        type: boolean
      version_tag:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string
      fresh_install:
        description: '⚠️ FRESH INSTALL: Drops ALL data (DB schemas, Keycloak)'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: '646966486018'
  ECR_REGISTRY: 646966486018.dkr.ecr.us-west-2.amazonaws.com
  ECR_MONOLITH: spacevox/monolith
  ECR_WORKFLOW_ENGINE: spacevox/workflow-engine
  ECR_DATAPLANE_AGENT: spacevox/dataplane-agent
  ECR_EMBEDDING_SERVICE: spacevox/embedding-service
  EC2_INSTANCE_ID: 'i-097c342f42e804775'
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC'

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  # ===========================================================================
  # Pre-flight Checks
  # ===========================================================================
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      fresh_install: ${{ steps.check_fresh.outputs.fresh_install }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Fresh Install Flag
        id: check_fresh
        run: |
          FRESH="${{ inputs.fresh_install }}"
          echo "fresh_install=${FRESH:-false}" >> $GITHUB_OUTPUT
          if [ "$FRESH" == "true" ]; then
            echo "⚠️ FRESH INSTALL ENABLED - ALL DATA WILL BE DELETED!"
            echo "⚠️ This includes: all wf_* schemas, keycloak schema, admin schema"
          fi

      - name: Determine Version
        id: version
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            VERSION="${{ inputs.version_tag }}"
          else
            # Auto-generate version from date and short SHA
            VERSION="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🏷️ Deploying version: $VERSION"

      - name: Verify Production Branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/production" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "❌ Production deploys must come from production branch"
            exit 1
          fi
          echo "✅ Branch verification passed"

  # ===========================================================================
  # Build Base Modules
  # ===========================================================================
  build-base:
    needs: preflight
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build Base Modules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Building base modules..."
          for module in base-common base-multi-tenant base-rls base-ai-common base-secret-store base-http base-conversation base-api-contracts base-tool-execution base-tool-execution-impl base-data-exchange base-mcp base-test-utils base-dataplane-common; do
            if [ -d "$module" ]; then
              echo "  → Building $module"
              cd $module
              mvn -B clean install -DskipTests -Dmaven.javadoc.skip=true -q
              cd ..
            fi
          done
          echo "✅ Base modules built"

      - name: Upload Base Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: base-modules
          path: ~/.m2/repository/com/svai/
          retention-days: 1

  # ===========================================================================
  # Build Services
  # ===========================================================================
  build-services:
    needs: build-base
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Download Base Artifacts
        uses: actions/download-artifact@v4
        with:
          name: base-modules
          path: ~/.m2/repository/com/svai/

      - name: Build Services
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Building services..."
          for service in account catalog config connection portal run storage subscription task trigger webhook insights notification ai-runtime studio-management kb-worker workflow-gateway; do
            if [ -d "$service" ]; then
              echo "  → Building $service"
              cd $service
              mvn -B clean install -DskipTests -Dmaven.javadoc.skip=true -q
              cd ..
            fi
          done
          echo "✅ Services built"

      - name: Upload Service Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-modules
          path: ~/.m2/repository/com/svai/
          retention-days: 1

  # ===========================================================================
  # Build Monolith JAR
  # ===========================================================================
  build-monolith:
    needs: build-services
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Download Service Artifacts
        uses: actions/download-artifact@v4
        with:
          name: service-modules
          path: ~/.m2/repository/com/svai/

      - name: Build Monolith
        working-directory: spacevox-monolith
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Building monolith..."
          if [ "${{ inputs.skip_tests }}" == "true" ]; then
            mvn -B clean package -DskipTests -Dmaven.javadoc.skip=true
          else
            mvn -B clean package -Dmaven.javadoc.skip=true
          fi
          echo "✅ Monolith built"
          ls -la target/*.jar

      - name: Upload Monolith JAR
        uses: actions/upload-artifact@v4
        with:
          name: monolith-jar
          path: spacevox-monolith/target/*.jar
          retention-days: 1

  # ===========================================================================
  # Build & Push Docker Image
  # ===========================================================================
  docker-build:
    needs: [preflight, build-monolith]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Download Monolith JAR
        uses: actions/download-artifact@v4
        with:
          name: monolith-jar
          path: spacevox-monolith/target/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        working-directory: spacevox-monolith
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          
          echo "🐳 Building Docker image..."
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:$VERSION .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:$VERSION \
                     ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:production
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:$VERSION \
                     ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:latest
          
          echo "📤 Pushing to ECR..."
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:$VERSION
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:production
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:latest
          
          echo "✅ Image pushed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:$VERSION"

  # ===========================================================================
  # Deploy to EC2
  # ===========================================================================
  deploy:
    needs: [preflight, docker-build]
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout infrastructure repo (for Keycloak realms)
        uses: actions/checkout@v4
        with:
          repository: spacevox-ai/infrastructure
          sparse-checkout: |
            local/keycloak/realms
          path: infrastructure

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fresh Install - Upload Keycloak Realms to S3
        if: ${{ needs.preflight.outputs.fresh_install == 'true' }}
        run: |
          # Use workflow-artifacts bucket for deployment files
          S3_BUCKET="spacevox-production-workflow-artifacts"
          
          echo "📦 Uploading Keycloak realm files to S3 bucket: $S3_BUCKET"
          aws s3 cp infrastructure/local/keycloak/realms/integration_platform-realm.json \
            "s3://${S3_BUCKET}/keycloak/realms/integration_platform-realm.json"
          aws s3 cp infrastructure/local/keycloak/realms/spacevox-admin-realm.json \
            "s3://${S3_BUCKET}/keycloak/realms/spacevox-admin-realm.json"
          echo "✅ Keycloak realms uploaded"

      - name: Fresh Install - Reset Database & Deploy via Docker Compose
        if: ${{ needs.preflight.outputs.fresh_install == 'true' }}
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          INSTANCE_ID="${{ env.EC2_INSTANCE_ID }}"
          S3_BUCKET="spacevox-production-workflow-artifacts"
          
          echo "🗑️ FRESH INSTALL: Resetting database and deploying $VERSION..."
          
          # SSM command for fresh install
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 900 \
            --parameters 'commands=[
              "set -e",
              "echo ========================================",
              "echo FRESH INSTALL - Resetting everything",
              "echo ========================================",
              "",
              "cd /opt/spacevox",
              "S3_BUCKET='"${S3_BUCKET}"'",
              "",
              "# 1. Stop all containers",
              "echo Step 1/8: Stopping all containers...",
              "docker-compose down --remove-orphans 2>/dev/null || true",
              "docker stop $(docker ps -q) 2>/dev/null || true",
              "",
              "# 2. Refresh Keycloak realms from S3 (docker-compose.yml and db-init already exist on EC2)",
              "echo Step 2/8: Refreshing Keycloak realms from S3...",
              "mkdir -p /opt/spacevox/keycloak/realms",
              "aws s3 cp \"s3://$S3_BUCKET/keycloak/realms/\" /opt/spacevox/keycloak/realms/ --recursive || echo 'Note: No realm files in S3, using existing'",
              "# docker-compose.yml and db-init-monolith.sql are managed by Terraform/EC2 setup",
              "ls -la /opt/spacevox/docker-compose.yml /opt/spacevox/db-init-monolith.sql",
              "",
              "# 3. Pull latest images",
              "echo Step 3/8: Pulling latest Docker images...",
              "aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "docker-compose pull || echo Pull failed, using existing images",
              "",
              "# 4. Load secrets from AWS Secrets Manager",
              "echo Step 4/8: Loading secrets...",
              "/opt/spacevox/fetch-secrets.sh || echo Secrets may already exist",
              "",
              "# 5. Drop all schemas (DESTRUCTIVE!)",
              "echo Step 5/8: Dropping ALL schemas (fresh install)...",
              "source /opt/spacevox/.env",
              "export PGPASSWORD=\"${ADMIN_DB_PASSWORD}\"",
              "DB_HOST=$(grep -oP \"(?<=DB_HOST=)[^\\s]+\" /opt/spacevox/base.env 2>/dev/null || echo spacevox-prod.cluster-c1su46cmsd55.us-west-2.rds.amazonaws.com)",
              "DB_HOST=$(echo $DB_HOST | tr -d \"'\\\"\")",
              "echo Connecting to: $DB_HOST",
              "psql -h $DB_HOST -U spacevox_admin -d spacevox << EOSQL",
              "DROP SCHEMA IF EXISTS keycloak CASCADE;",
              "DROP SCHEMA IF EXISTS admin CASCADE;",
              "DROP SCHEMA IF EXISTS wf_account CASCADE;",
              "DROP SCHEMA IF EXISTS wf_catalog CASCADE;",
              "DROP SCHEMA IF EXISTS wf_config CASCADE;",
              "DROP SCHEMA IF EXISTS wf_connection CASCADE;",
              "DROP SCHEMA IF EXISTS wf_portal_be CASCADE;",
              "DROP SCHEMA IF EXISTS wf_run CASCADE;",
              "DROP SCHEMA IF EXISTS wf_storage CASCADE;",
              "DROP SCHEMA IF EXISTS wf_task CASCADE;",
              "DROP SCHEMA IF EXISTS wf_trigger CASCADE;",
              "DROP SCHEMA IF EXISTS wf_webhook CASCADE;",
              "DROP SCHEMA IF EXISTS wf_subscription CASCADE;",
              "DROP SCHEMA IF EXISTS wf_notification CASCADE;",
              "DROP SCHEMA IF EXISTS wf_insights CASCADE;",
              "DROP SCHEMA IF EXISTS wf_kb_worker CASCADE;",
              "DROP SCHEMA IF EXISTS wf_gateway CASCADE;",
              "DROP SCHEMA IF EXISTS wf_studio_mgmt CASCADE;",
              "DROP SCHEMA IF EXISTS wf_ai_runtime CASCADE;",
              "DROP SCHEMA IF EXISTS wf_vector CASCADE;",
              "DROP SCHEMA IF EXISTS wf_voip CASCADE;",
              "DROP SCHEMA IF EXISTS wf_voip_runtime CASCADE;",
              "EOSQL",
              "echo Schemas dropped successfully",
              "",
              "# 6. Start services via docker-compose (includes db-init and keycloak)",
              "echo Step 6/8: Starting services via docker-compose...",
              "docker-compose up -d",
              "",
              "# 7. Wait for db-init to complete",
              "echo Step 7/8: Waiting for db-init to complete...",
              "sleep 45",
              "docker-compose logs db-init",
              "",
              "# 8. Verify monolith is starting",
              "echo Step 8/8: Waiting for monolith to be healthy...",
              "for i in $(seq 1 60); do",
              "  if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then",
              "    echo Monolith is healthy!",
              "    break",
              "  fi",
              "  echo Attempt $i/60 - waiting...",
              "  sleep 10",
              "done",
              "",
              "# Cleanup",
              "docker image prune -f",
              "",
              "echo ========================================",
              "echo FRESH INSTALL COMPLETE: '"$VERSION"'",
              "echo ========================================"
            ]' \
            --output text \
            --query "Command.CommandId")
          
          echo "⏳ Waiting for fresh install to complete (this may take 5-10 minutes)..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true
          
          # Get command output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text | tail -100
          
          echo "✅ Fresh install deployment completed"

      - name: Rolling Update - Deploy via Docker Run
        if: ${{ needs.preflight.outputs.fresh_install != 'true' }}
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          INSTANCE_ID="${{ env.EC2_INSTANCE_ID }}"
          
          echo "🚀 Deploying $VERSION to production EC2 (rolling update)..."
          
          # Send SSM command to pull and restart
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "echo Deploying version: '"$VERSION"'",
              "aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:'"$VERSION"'",
              "docker stop spacevox-monolith 2>/dev/null || true",
              "docker rm spacevox-monolith 2>/dev/null || true",
              "docker run -d --name spacevox-monolith --network spacevox-net --restart unless-stopped --memory 4g --cpus 2 -p 8080:8080 -p 9090:9090 --env-file /opt/spacevox/config/monolith.env -v /opt/spacevox/logs/monolith:/app/logs ${{ env.ECR_REGISTRY }}/${{ env.ECR_MONOLITH }}:'"$VERSION"'",
              "docker image prune -f",
              "echo Deploy completed: '"$VERSION"'"
            ]' \
            --output text \
            --query "Command.CommandId")
          
          echo "⏳ Waiting for deployment to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
          
          echo "✅ Deployment completed"

      - name: Verify Deployment
        run: |
          HEALTH_URL="https://api.work.studio/actuator/health"
          
          echo "🔍 Verifying deployment health..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "✅ Application is healthy!"
              exit 0
            fi
            echo "  Attempt $i/30: Status $STATUS, waiting..."
            sleep 10
          done
          
          echo "❌ Health check failed after 5 minutes"
          exit 1

  # ===========================================================================
  # Notify
  # ===========================================================================
  notify:
    needs: [preflight, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Notify Success
        if: ${{ needs.deploy.result == 'success' }}
        run: |
          echo "🎉 Production deployment successful!"
          echo "Version: ${{ needs.preflight.outputs.version }}"

      - name: Notify Failure
        if: ${{ needs.deploy.result == 'failure' }}
        run: |
          echo "❌ Production deployment failed!"
          echo "Check the workflow logs for details."
          exit 1
